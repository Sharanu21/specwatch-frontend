[build]
  base    = "."
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # VITE_API_URL must be set in Netlify dashboard:
  # Site settings → Environment variables → VITE_API_URL = https://your-app.onrender.com

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
